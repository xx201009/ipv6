<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        // 直接读取ip仓库的ip.txt并跳转（适配master分支）
        fetch('https://raw.githubusercontent.com/xx201009/ip/master/ip.txt')
            .then(res => res.text())
            .then(url => {
                if (url.trim()) window.location.href = url.trim();
            });
    </script>
</body>
</html>
