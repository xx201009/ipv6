
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        // 从ip.txt获取地址并跳转
        fetch('https://raw.githubusercontent.com/xx201009/ip/main/ip.txt')
            .then(res => res.text())
            .then(url => {
                if (url.trim()) window.location.href = url.trim();
            });
    </script>
</body>
</html>
