<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动跳转中...</title>
    <script>
        // 从GitHub仓库读取ip.txt中的地址（替换为你的仓库信息）
        const githubUser = "xx201009"; // 你的GitHub用户名
        const githubRepo = "ip";       // 仓库名
        const branch = "main";         // 分支名（与脚本一致）
        const ipFileUrl = `https://raw.githubusercontent.com/${githubUser}/${githubRepo}/${branch}/ip.txt`;

        // 页面加载后立即执行
        window.onload = async () => {
            try {
                // 读取ip.txt内容
                const response = await fetch(ipFileUrl);
                if (!response.ok) {
                    throw new Error(`文件获取失败，状态码：${response.status}`);
                }

                // 获取地址并去除空格/换行
                const targetUrl = (await response.text()).trim();

                if (!targetUrl) {
                    throw new Error("未获取到有效跳转地址");
                }

                // 验证地址格式（简单校验是否包含http和IPv6特征）
                if (!targetUrl.startsWith('http') || !targetUrl.includes('[')) {
                    throw new Error(`地址格式错误：${targetUrl}`);
                }

                // 自动跳转
                console.log(`即将跳转到：${targetUrl}`);
                window.location.href = targetUrl;

            } catch (error) {
                // 错误处理（显示提示信息）
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 50px;">
                        <h2>跳转失败</h2>
                        <p>错误信息：${error.message}</p>
                        <p>请手动访问目标地址</p>
                    </div>
                `;
                console.error("跳转错误：", error);
            }
        };
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>正在获取跳转地址，请稍候...</h2>
        <p>若长时间未跳转，请刷新页面重试</p>
    </div>
</body>
</html>
