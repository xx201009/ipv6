<!DOCTYPE html>
<html>
    <head>
            <meta charset="UTF-8">
                <title>IPv6自动跳转</title>
                    <script>
                                // 从Gitee获取最新IPv6地址
                                        fetch('https://gitee.com/你的用户名/dynamic-ip/raw/master/ip.txt')
                                                    .then(response => {
                                                                    if (!response.ok) throw new Error('获取IP失败');
               8                                                                     return response.text(); // 读取IP文本（纯IPv6地址，如240e:xxx:xxx::1）
                                                                                                })
                                                                                                            .then(ipv6 => {
                                                                                                                            // 处理IPv6地址（去除空格/换行）
                                                                                                                                            ipv6 = ipv6.trim();
                                                                                                                                                            if (ipv6 === '') throw new Error('IP地址为空');
                                                                                                                                                                            
                                                                                                                                                                                            // 拼接跳转URL（假设路由器管理页面端口为80，根据实际修改）
                                                                                                                                                                                                            const redirectUrl = `http://[${ipv6}]`; // IPv6地址需用[]包裹
                                                                                                                                                                                                                            console.log('即将跳转到：', redirectUrl);
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                            // 自动跳转
                                                                                                                                                                                                                                                                            window.location.href = redirectUrl;
                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                    .catch(error => {
                                                                                                                                                                                                                                                                                                                    // 错误处理（显示提示）
                                                                                                                                                                                                                                                                                                                                    document.body.innerHTML = `<h3>跳转失败：${error.message}</h3><p>请检查网络或手动输入IP：<input id="ipInput" type="text"><button onclick="manualRedirect()">跳转</button></p>`;
                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                        // 手动跳转函数（用于错误时备用）
                                                                                                                                                                                                                                                                                                                                                                function manualRedirect() {
                                                                                                                                                                                                                                                                                                                                                                            const ipv6 = document.getElementById('ipInput').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                        if (ipv6) window.location.href = `http://[${ipv6}]`;
                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                                                                                                                                                                    <body>
                                                                                                                                                                                                                                                                                                                                                                                                            <h3>正在获取最新IPv6地址，即将自动跳转...</h3>
                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                            </html>
